<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HABERLER</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

:root{
  --ff-head:'Playfair Display',Georgia,serif;
  --ff-body:'DM Sans',sans-serif;
  --bg:#0c0c0e;--bg2:#111115;--bg3:#16161c;
  --surface:#1a1a20;--surface2:#222228;--surface3:#2a2a32;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--border3:rgba(255,255,255,0.2);
  --text:#f0ede8;--text2:#a0a0aa;--text3:#50505a;
  --accent:#e8c84a;--accent2:#c9a82a;--accent-rgb:232,200,74;
  --live:#ef4444;
  --read-bg:rgba(232,200,74,0.04);--read-border:rgba(232,200,74,0.15);
  --shadow:0 8px 32px rgba(0,0,0,0.6);--shadow-sm:0 2px 12px rgba(0,0,0,0.4);
  --r:16px;--r-sm:10px;--r-xs:6px;
  --sidebar:240px;--header:60px;
}
[data-theme="light"]{
  --bg:#f2f0ea;--bg2:#eae8e0;--bg3:#e0ddd4;
  --surface:#fff;--surface2:#f5f3ec;--surface3:#eae8e0;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--border3:rgba(0,0,0,0.22);
  --text:#0e0e10;--text2:#545460;--text3:#a0a0aa;
  --accent:#b08a08;--accent2:#8a6c06;--accent-rgb:176,138,8;
  --live:#dc2626;
  --read-bg:rgba(176,138,8,0.04);--read-border:rgba(176,138,8,0.18);
  --shadow:0 8px 32px rgba(0,0,0,0.10);--shadow-sm:0 2px 12px rgba(0,0,0,0.08);
}

body{font-family:var(--ff-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
a{color:inherit;text-decoration:none}

/* ─── HEADER ──────────────────────────────────────────────── */
#hdr{
  position:fixed;top:0;left:0;right:0;z-index:300;height:var(--header);
  background:var(--bg);border-bottom:.5px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:14px;
}
.logo{
  font-family:var(--ff-head);font-size:20px;font-weight:900;
  letter-spacing:-.5px;display:flex;align-items:center;gap:9px;flex-shrink:0;
}
.live-dot{
  width:8px;height:8px;border-radius:50%;background:var(--live);flex-shrink:0;
  animation:livepulse 2s ease-in-out infinite;
}
@keyframes livepulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.85)}}

.search-wrap{
  flex:1;max-width:380px;
  display:flex;align-items:center;gap:9px;
  background:var(--surface);border:.5px solid var(--border2);border-radius:28px;
  padding:8px 16px;transition:border-color .2s,box-shadow .2s;
}
.search-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(var(--accent-rgb),.12)}
.search-wrap input{border:none;background:transparent;font-family:var(--ff-body);font-size:13.5px;color:var(--text);outline:none;width:100%}
.search-wrap input::placeholder{color:var(--text3)}

.hdr-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.ibtn{
  width:36px;height:36px;border-radius:9px;border:.5px solid var(--border2);
  background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text2);transition:all .15s;flex-shrink:0;
}
.ibtn:hover{background:var(--surface2);color:var(--text);border-color:var(--accent)}
.ibtn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

#newsBadge{
  display:none;background:var(--accent);color:#0e0e10;
  font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;
  cursor:pointer;white-space:nowrap;transition:transform .1s;
}
#newsBadge:hover{transform:scale(1.03)}

/* ─── SIDEBAR ─────────────────────────────────────────────── */
#sidebar{
  position:fixed;top:var(--header);left:0;bottom:0;width:var(--sidebar);
  background:var(--bg2);border-right:.5px solid var(--border);
  overflow-y:auto;padding:16px 10px;z-index:100;
}
.s-label{
  font-size:10px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;
  color:var(--text3);padding:0 8px;margin:18px 0 6px;
}
.s-label:first-child{margin-top:0}

.ch-row{
  display:flex;align-items:center;gap:9px;
  padding:8px 8px;border-radius:9px;cursor:pointer;
  font-size:13px;font-weight:500;color:var(--text2);
  transition:all .12s;border:.5px solid transparent;margin-bottom:2px;
  position:relative;
}
.ch-row:hover{background:var(--surface);color:var(--text)}
.ch-row.active{background:var(--surface);color:var(--text);border-color:var(--border2)}
.ch-row.active::before{
  content:'';position:absolute;left:0;top:20%;bottom:20%;
  width:2.5px;border-radius:2px;background:var(--accent);
}
.ch-color{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ch-status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-left:auto}
.ch-status-dot.ok{background:#22c55e}
.ch-status-dot.fail{background:#ef4444}
.ch-status-dot.loading{background:#f59e0b;animation:pulse-s .9s ease-in-out infinite}
@keyframes pulse-s{0%,100%{opacity:1}50%{opacity:.25}}
.ch-count{font-size:11px;color:var(--text3);margin-left:auto;font-weight:400}

.s-btn{
  display:flex;align-items:center;gap:9px;
  padding:8px 8px;border-radius:9px;cursor:pointer;
  font-size:13px;color:var(--text2);transition:all .12s;margin-bottom:2px;
}
.s-btn:hover{background:var(--surface);color:var(--text)}
.s-btn.active{color:var(--accent)}
.s-btn .s-ico{font-size:14px;width:18px;text-align:center}

/* ─── MAIN ────────────────────────────────────────────────── */
#main{margin-left:var(--sidebar);padding-top:var(--header);min-height:100vh}
.inner{max-width:1160px;margin:0 auto;padding:24px 24px 60px}

/* ─── TICKER ──────────────────────────────────────────────── */
#ticker{
  display:flex;align-items:center;height:38px;
  background:var(--surface);border:.5px solid var(--border);border-radius:9px;
  overflow:hidden;margin-bottom:22px;
}
.t-tag{
  background:var(--accent);color:#0e0e10;
  font-size:10px;font-weight:800;letter-spacing:1.2px;
  padding:0 14px;height:100%;display:flex;align-items:center;
  white-space:nowrap;flex-shrink:0;
}
.t-wrap{flex:1;overflow:hidden}
.t-inner{
  display:flex;gap:36px;white-space:nowrap;
  animation:ticker 80s linear infinite;
  padding:0 20px;font-size:12.5px;color:var(--text2);
}
.t-inner:hover{animation-play-state:paused}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.t-sep{color:var(--accent);flex-shrink:0}

/* ─── STATS BAR ───────────────────────────────────────────── */
#statsRow{
  display:flex;align-items:center;gap:4px;
  font-size:12px;color:var(--text3);margin-bottom:18px;flex-wrap:wrap;
}
#statsRow b{color:var(--text2);font-weight:500}
.dot-sep{width:3px;height:3px;border-radius:50%;background:var(--border3);margin:0 8px}

/* ─── GRID ────────────────────────────────────────────────── */
#grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}

/* ─── CARD ────────────────────────────────────────────────── */
.card{
  background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);
  overflow:hidden;cursor:pointer;display:flex;flex-direction:column;
  transition:transform .2s,border-color .2s,box-shadow .2s;
  animation:fadeUp .3s ease both;position:relative;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card:hover{transform:translateY(-3px);border-color:var(--border2);box-shadow:var(--shadow-sm)}
.card.read{opacity:.65;background:var(--read-bg);border-color:var(--read-border)}
.card.read:hover{opacity:.9}

/* featured = first card */
.card.feat{grid-column:span 2}
.card.feat .c-img{height:260px}
.card.feat .c-title{font-size:21px;-webkit-line-clamp:4}
.card.feat .c-desc{-webkit-line-clamp:3}

.c-img-wrap{position:relative;overflow:hidden;flex-shrink:0}
.c-img{
  width:100%;height:180px;object-fit:cover;display:block;background:var(--surface2);
  transition:transform .3s;
}
.card:hover .c-img{transform:scale(1.04)}
.c-img-ph{
  width:100%;height:180px;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.c-img-ph svg{width:40px;height:40px;opacity:.15;stroke:var(--text);fill:none;stroke-width:1.2}
.c-read-lbl{
  position:absolute;top:10px;right:10px;z-index:2;
  background:rgba(0,0,0,.65);border:.5px solid var(--accent);
  color:var(--accent);font-size:9px;font-weight:800;letter-spacing:.8px;
  padding:3px 7px;border-radius:4px;display:none;
}
.card.read .c-read-lbl{display:block}

.c-body{padding:14px;display:flex;flex-direction:column;gap:7px;flex:1}
.c-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.c-badge{
  font-size:9.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
  padding:3px 8px;border-radius:4px;flex-shrink:0;
}
.c-time{font-size:11px;color:var(--text3);margin-left:auto}
.c-title{
  font-family:var(--ff-head);font-size:15px;font-weight:700;line-height:1.35;color:var(--text);
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.card.read .c-title{color:var(--text2)}
.c-desc{
  font-size:12.5px;color:var(--text2);line-height:1.6;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.c-foot{
  margin-top:auto;padding-top:10px;
  display:flex;align-items:center;justify-content:space-between;
  border-top:.5px solid var(--border);
}
.c-rt{font-size:11px;color:var(--text3)}
.c-arr{
  width:26px;height:26px;border-radius:7px;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.card:hover .c-arr{background:var(--accent)}
.c-arr svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;transition:color .15s}
.card:hover .c-arr svg{color:#0e0e10}

/* ─── SKELETON ────────────────────────────────────────────── */
.skel{
  background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);overflow:hidden;
  animation:fadeUp .3s ease both;
}
.sk{background:var(--surface2);border-radius:4px;animation:shimmer 1.7s ease-in-out infinite}
@keyframes shimmer{0%,100%{opacity:1}50%{opacity:.3}}

/* ─── LOAD MORE ───────────────────────────────────────────── */
#lmWrap{text-align:center;padding:24px 0;display:none}
.lm-btn{
  padding:11px 28px;border-radius:28px;background:transparent;
  border:.5px solid var(--border2);color:var(--text2);
  font-family:var(--ff-body);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;
}
.lm-btn:hover{background:var(--surface);color:var(--text);border-color:var(--accent)}

/* ─── MODAL ───────────────────────────────────────────────── */
#mbg{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.8);backdrop-filter:blur(8px);
  display:none;align-items:flex-start;justify-content:center;
  padding:32px 16px;overflow-y:auto;
}
#mbg.open{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

#modal{
  background:var(--surface);border:.5px solid var(--border2);border-radius:20px;
  width:100%;max-width:740px;overflow:hidden;margin:auto;
  animation:slideUp .25s ease;position:relative;
}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

#mImgWrap{position:relative;overflow:hidden}
#mImgWrap::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 50%,var(--surface));
}
#mImg{width:100%;height:320px;object-fit:cover;display:block;background:var(--surface2)}
.m-close{
  position:absolute;top:14px;right:14px;z-index:10;
  width:34px;height:34px;border-radius:9px;
  background:rgba(0,0,0,.55);border:.5px solid rgba(255,255,255,.15);
  cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;
  transition:all .15s;
}
.m-close:hover{background:rgba(255,255,255,.15)}
.m-close svg{width:15px;height:15px}

.m-body{padding:28px 32px 32px}
.m-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;
  padding:4px 10px;border-radius:5px;margin-bottom:14px;
}
#mTitle{font-family:var(--ff-head);font-size:26px;font-weight:900;line-height:1.25;color:var(--text);margin-bottom:12px}
.m-meta{
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  font-size:12px;color:var(--text3);
  margin-bottom:22px;padding-bottom:18px;border-bottom:.5px solid var(--border);
}
.m-meta span{display:flex;align-items:center;gap:5px}
.m-meta svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}

#mContent{font-size:15.5px;line-height:1.85;color:var(--text2)}
#mContent p{margin-bottom:1.1em}
#mContent p:last-child{margin-bottom:0}
.m-full-note{
  margin-top:18px;padding:12px 16px;
  background:var(--surface2);border-radius:var(--r-sm);
  font-size:13px;color:var(--text3);
  border-left:3px solid var(--accent);
}

.m-actions{
  display:flex;gap:10px;margin-top:24px;padding-top:18px;
  border-top:.5px solid var(--border);flex-wrap:wrap;
}
.btn-p{
  display:flex;align-items:center;gap:7px;padding:10px 18px;border-radius:var(--r-sm);
  background:var(--accent);color:#0e0e10;
  font-family:var(--ff-body);font-size:13.5px;font-weight:700;border:none;cursor:pointer;
  text-decoration:none;transition:all .15s;
}
.btn-p:hover{background:var(--accent2)}
.btn-p svg,.btn-s svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.btn-s{
  display:flex;align-items:center;gap:7px;padding:10px 18px;border-radius:var(--r-sm);
  background:var(--surface2);color:var(--text);
  font-family:var(--ff-body);font-size:13.5px;font-weight:500;
  border:.5px solid var(--border2);cursor:pointer;transition:all .15s;
}
.btn-s:hover{background:var(--surface3)}

/* ─── SOURCE MANAGER MODAL ────────────────────────────────── */
#smBg{
  position:fixed;inset:0;z-index:600;
  background:rgba(0,0,0,.8);backdrop-filter:blur(8px);
  display:none;align-items:flex-start;justify-content:center;
  padding:32px 16px;overflow-y:auto;
}
#smBg.open{display:flex;animation:fadeIn .2s ease}
#sm{
  background:var(--surface);border:.5px solid var(--border2);border-radius:20px;
  width:100%;max-width:680px;margin:auto;overflow:hidden;
  animation:slideUp .25s ease;
}
.sm-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:22px 26px;border-bottom:.5px solid var(--border);
}
.sm-head h2{font-family:var(--ff-head);font-size:22px;font-weight:900}
.sm-tabs{display:flex;gap:4px;padding:16px 26px 0;border-bottom:.5px solid var(--border)}
.sm-tab{
  padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;
  border-radius:8px 8px 0 0;color:var(--text2);border:.5px solid transparent;
  border-bottom:none;transition:all .15s;margin-bottom:-1px;
}
.sm-tab.active{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.sm-tab-panel{display:none;padding:20px 26px 26px}
.sm-tab-panel.active{display:block}

/* Source list */
.src-list{display:flex;flex-direction:column;gap:8px;max-height:380px;overflow-y:auto;padding-right:4px}
.src-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;background:var(--surface2);border-radius:var(--r-sm);
  border:.5px solid var(--border);
}
.src-color{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.src-info{flex:1;min-width:0}
.src-name{font-size:14px;font-weight:600}
.src-url{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.src-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.src-toggle{
  position:relative;width:36px;height:20px;cursor:pointer;
}
.src-toggle input{opacity:0;width:0;height:0}
.src-track{
  position:absolute;inset:0;background:var(--surface3);border-radius:10px;transition:background .2s;
}
.src-toggle input:checked + .src-track{background:var(--accent)}
.src-thumb{
  position:absolute;top:3px;left:3px;width:14px;height:14px;
  background:#fff;border-radius:50%;transition:transform .2s;
}
.src-toggle input:checked ~ .src-thumb{transform:translateX(16px)}
.src-del{
  width:28px;height:28px;border-radius:7px;background:transparent;
  border:.5px solid var(--border2);cursor:pointer;color:var(--text3);
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.src-del:hover{background:rgba(239,68,68,.15);border-color:#ef4444;color:#ef4444}
.src-del svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}

/* Add source form */
.add-form{display:flex;flex-direction:column;gap:14px}
.form-row{display:flex;flex-direction:column;gap:6px}
.form-row label{font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.3px}
.form-inp{
  background:var(--surface2);border:.5px solid var(--border2);border-radius:var(--r-sm);
  padding:10px 14px;font-family:var(--ff-body);font-size:13.5px;color:var(--text);outline:none;
  transition:border-color .2s;
}
.form-inp:focus{border-color:var(--accent)}
.form-inp::placeholder{color:var(--text3)}
.color-row{display:flex;gap:8px;flex-wrap:wrap}
.color-swatch{
  width:28px;height:28px;border-radius:7px;cursor:pointer;
  border:2px solid transparent;transition:all .15s;
}
.color-swatch.sel{border-color:var(--text);transform:scale(1.1)}
.form-hint{font-size:11px;color:var(--text3);line-height:1.6}

/* Filter panel */
.filter-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.filter-chip{
  display:flex;align-items:center;gap:9px;
  padding:10px 12px;background:var(--surface2);border-radius:var(--r-sm);
  border:.5px solid var(--border);cursor:pointer;font-size:13px;transition:all .15s;
}
.filter-chip:hover{border-color:var(--border2)}
.filter-chip input{accent-color:var(--accent);width:15px;height:15px}
.filter-chip.disabled{opacity:.5}

/* ─── TOAST ───────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--surface);border:.5px solid var(--border2);border-radius:28px;
  padding:9px 20px;font-size:13px;color:var(--text2);box-shadow:var(--shadow);
  z-index:700;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── EMPTY ───────────────────────────────────────────────── */
#empty{
  display:none;grid-column:1/-1;padding:60px;text-align:center;color:var(--text3);
}
#empty svg{width:44px;height:44px;margin:0 auto 14px;display:block;opacity:.25;stroke:currentColor;fill:none;stroke-width:1.2}

/* ─── RESPONSIVE ──────────────────────────────────────────── */
@media(max-width:1060px){#grid{grid-template-columns:repeat(2,1fr)}.card.feat{grid-column:span 2}}
@media(max-width:720px){
  #sidebar{display:none}#main{margin-left:0}
  #grid{grid-template-columns:1fr}.card.feat{grid-column:span 1}
  .inner{padding:14px}
  .search-wrap{max-width:none}
  #mTitle{font-size:20px}.m-body{padding:20px}
}

/* light mode adjustments */
[data-theme="light"] .card:hover{box-shadow:0 6px 24px rgba(0,0,0,.1)}
[data-theme="light"] #mImg,[data-theme="light"] .c-img{filter:brightness(.98)}
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <div class="logo"><span class="live-dot"></span>HABERLER</div>
  <div class="search-wrap">

<script>
// ══════════════════════════════════════════════════════════
// CONFIG & DEFAULTS
// ══════════════════════════════════════════════════════════
const K = {
  SOURCES : 'hbr_sources_v4',
  CACHE   : 'hbr_cache_v4',
  READ    : 'hbr_read_v2',
  THEME   : 'hbr_theme',
  ENABLED : 'hbr_enabled_v4',
  PROXY   : 'hbr_proxy',
};
const PAGE_SIZE = 30;
const MAX_CACHE = 200;

const DEFAULT_SOURCES = [
  {id:'ntv',       name:'NTV',          rss:'https://www.ntv.com.tr/son-dakika.rss',                  color:'#3b82f6'},
  {id:'cnn',       name:'CNN Türk',     rss:'https://www.cnnturk.com/feed/rss/all/news',              color:'#ef4444'},
  {id:'hurriyet',  name:'Hürriyet',     rss:'https://www.hurriyet.com.tr/rss/anasayfa',               color:'#f59e0b'},
  {id:'sabah',     name:'Sabah',        rss:'https://www.sabah.com.tr/rss/anasakfa.xml',              color:'#a855f7'},
  {id:'milliyet',  name:'Milliyet',     rss:'https://www.milliyet.com.tr/rss/rssnew/gundemrss.xml',   color:'#22c55e'},
  {id:'haberturk', name:'Habertürk',    rss:'https://www.haberturk.com/rss',                          color:'#06b6d4'},
  {id:'sozcu',     name:'Sözcü',        rss:'https://www.sozcu.com.tr/rss.xml',                       color:'#f97316'},
  {id:'cumhuriyet',name:'Cumhuriyet',   rss:'https://www.cumhuriyet.com.tr/rss/son_dakika.xml',       color:'#94a3b8'},
  {id:'aa',        name:'Anadolu Ajansı',rss:'https://www.aa.com.tr/tr/rss/default?cat=guncel',       color:'#10b981'},
  {id:'trt',       name:'TRT Haber',    rss:'https://www.trthaber.com/sondakika.rss',                  color:'#ec4899'},
  {id:'bbctr',     name:'BBC Türkçe',   rss:'https://feeds.bbci.co.uk/turkce/rss.xml',               color:'#e11d48'},
  {id:'dw',        name:'DW Türkçe',    rss:'https://rss.dw.com/rdf/rss-tur-all',                    color:'#6366f1'},
  {id:'euronews',  name:'Euronews TR',  rss:'https://tr.euronews.com/rss?level=theme&name=news',      color:'#0891b2'},
];

const PALETTE = ['#3b82f6','#ef4444','#f59e0b','#22c55e','#a855f7','#06b6d4','#f97316','#ec4899','#10b981','#6366f1','#e11d48','#94a3b8','#0891b2','#84cc16'];

const CATS = [
  {id:'all',label:'Tümü',ico:'◈'},
  {id:'gundem',label:'Gündem',ico:'◉'},
  {id:'ekonomi',label:'Ekonomi',ico:'◎'},
  {id:'spor',label:'Spor',ico:'◌'},
  {id:'dunya',label:'Dünya',ico:'◍'},
  {id:'teknoloji',label:'Teknoloji',ico:'▣'},
];

// Proxy list - tried in order, browser has no sandbox restrictions
const GAS = () => localStorage.getItem(K.PROXY) || '';
const PROXY_FNS = [
  u => { const g=GAS(); return g ? g+'?url='+encodeURIComponent(u) : null; },
  u => `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(u)}&count=25`,
  u => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://thingproxy.freeboard.io/fetch/${u}`,
];

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
let sources   = loadSources();
let enabled   = new Set(JSON.parse(localStorage.getItem(K.ENABLED) || 'null') || sources.map(s=>s.id));
let allNews   = loadCache();
let pending   = [];
let readSet   = new Set(JSON.parse(localStorage.getItem(K.READ)||'[]'));
let chStatus  = {};
let activeCh  = 'all';
let activeCat = 'all';
let searchQ   = '';
let pageOff   = 0;
let refreshT;
let selectedColor = PALETTE[0];
let smActiveTab = 'sources';

// ══════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════
(function boot(){
  applyTheme();
  buildSidebar();
  buildColorPalette();
  renderGrid();
  fetchAll();
  document.getElementById('searchInput').addEventListener('input', e=>{
    searchQ = e.target.value.toLowerCase().trim();
    pageOff = 0;
    renderGrid();
  });
  document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ closeModal(); closeSM(); }});
})();

// ══════════════════════════════════════════════════════════
// STORAGE
// ══════════════════════════════════════════════════════════
function loadSources(){
  try{ const s=JSON.parse(localStorage.getItem(K.SOURCES)); if(s&&s.length) return s; }catch{}
  return DEFAULT_SOURCES.map(s=>({...s}));
}
function saveSources(){ localStorage.setItem(K.SOURCES, JSON.stringify(sources)); }
function saveEnabled(){ localStorage.setItem(K.ENABLED, JSON.stringify([...enabled])); }
function loadCache(){
  try{ const c=JSON.parse(localStorage.getItem(K.CACHE)); if(c&&c.length) return c; }catch{}
  return [];
}
function saveCache(){ try{ localStorage.setItem(K.CACHE, JSON.stringify(allNews.slice(0,MAX_CACHE))); }catch{} }
function saveRead(){ try{ localStorage.setItem(K.READ, JSON.stringify([...readSet].slice(0,2000))); }catch{} }

// ══════════════════════════════════════════════════════════
// FETCH
// ══════════════════════════════════════════════════════════
async function fetchFeed(src){
  // Try each proxy
  for(const pfn of PROXY_FNS){
    const pu = pfn(src.rss);
    if(!pu) continue;
    try{
      const res = await fetch(pu, {signal: AbortSignal.timeout(10000)});
      if(!res.ok) continue;

      // rss2json returns JSON directly with images
      if(pu.includes('rss2json')){
        const j = await res.json();
        if(j.status==='ok' && j.items && j.items.length){
          return parseRSS2JSON(j, src);
        }
        continue;
      }

      const raw = await res.text();
      let text = raw;
      // allorigins wraps in JSON
      if(pu.includes('allorigins')){
        try{ text = JSON.parse(raw).contents || raw; }catch{}
      }
      if(isRSS(text)) return parseXML(text, src);
    }catch{}
  }
  return [];
}

function isRSS(t){ return t && (t.includes('<item') || t.includes('<entry') || t.includes('<rss')); }

// rss2json already extracts thumbnail + full description
function parseRSS2JSON(json, src){
  return json.items.map(item => {
    const title = (item.title||'').trim();
    if(!title || title.length < 3) return null;
    const desc = stripHTML(item.description || item.content || '');
    const fullHtml = item.content || item.description || '';
    const img = item.thumbnail || item.enclosure?.link || extractImgSrc(fullHtml) || '';
    const ts = new Date(item.pubDate||0).getTime() || 0;
    const id = makeID(src.id, title);
    return { id, title, desc: desc.slice(0,500), fullDesc: desc, img, link: item.link||'', pubDate: item.pubDate, ts, src, cat: detectCat(title+' '+desc) };
  }).filter(Boolean);
}

// XML parser for when rss2json fails
function parseXML(xml, src){
  try{
    const doc = new DOMParser().parseFromString(xml, 'text/xml');
    if(doc.querySelector('parsererror')) return [];
    return Array.from(doc.querySelectorAll('item,entry')).slice(0,25).map(item => {
      const title = xText(item,['title']).trim();
      if(!title||title.length<3) return null;
      // Try many image locations
      const img = xImg(item, xml);
      // Get full description
      const rawDesc = xText(item,['content:encoded','content','description','summary']);
      const desc = stripHTML(rawDesc).slice(0,600);
      const link = xLink(item);
      const pubDate = xText(item,['pubDate','pubdate','published','updated']);
      const ts = new Date(pubDate||0).getTime() || 0;
      const id = makeID(src.id, title);
      return { id, title, desc, fullDesc: desc, img, link, pubDate, ts, src, cat: detectCat(title+' '+desc) };
    }).filter(Boolean);
  }catch{ return []; }
}

function xText(el,tags){
  for(const t of tags){
    // Try with and without namespace
    const n = el.querySelector(t) || el.getElementsByTagNameNS('*',t.split(':').pop())[0];
    if(n) return (n.textContent||'').trim();
  }
  return '';
}
function xLink(item){
  const l = item.querySelector('link');
  if(l){ const h=l.getAttribute('href'); return h||l.textContent.trim(); }
  return '';
}
function xImg(item, xml){
  // 1. media:content url
  const mc = item.getElementsByTagNameNS('*','content')[0];
  if(mc){ const u=mc.getAttribute('url'); if(u&&isImgUrl(u)) return u; }
  // 2. media:thumbnail
  const mt = item.getElementsByTagNameNS('*','thumbnail')[0];
  if(mt){ const u=mt.getAttribute('url')||mt.textContent; if(u&&isImgUrl(u)) return u; }
  // 3. enclosure
  const enc = item.querySelector('enclosure');
  if(enc){ const u=enc.getAttribute('url'); if(u&&isImgUrl(u)) return u; }
  // 4. img in description HTML
  const rawDesc = xText(item,['content:encoded','content','description']);
  return extractImgSrc(rawDesc);
}
function isImgUrl(u){ return /\.(jpg|jpeg|png|webp|gif)(\?|$)/i.test(u); }
function extractImgSrc(html){
  const m = html.match(/src=["']([^"']+\.(jpg|jpeg|png|webp))[^"']*/i);
  return m ? m[1] : '';
}
function stripHTML(s){ return s.replace(/<[^>]*>/g,'').replace(/&[a-z#0-9]+;/gi,' ').replace(/\s+/g,' ').trim(); }
function makeID(srcId, title){ return srcId+'_'+btoa(encodeURIComponent(title.slice(0,40))).slice(0,20); }
function detectCat(t){
  const s = t.toLowerCase();
  if(/ekonom|borsa|dolar|euro|enflasyon|piyasa|faiz|bütçe|ihracat/.test(s)) return 'ekonomi';
  if(/futbol|basketbol|spor|lig|maç|gol|transfer|fenerbah|galatasaray|beşiktaş|trabzon|formula|tenis/.test(s)) return 'spor';
  if(/dünya|küresel|uluslararası|nato|abd |rusya|çin|avrupa|ukrayna|gazze|suriye/.test(s)) return 'dunya';
  if(/teknoloji|yapay zeka|ai |uzay|bilim|iphone|android|yazılım|uygulama|dijital/.test(s)) return 'teknoloji';
  return 'gundem';
}
function timeAgo(ts){
  if(!ts) return '';
  const d=(Date.now()-ts)/1000;
  if(d<60) return 'Az önce';
  if(d<3600) return Math.floor(d/60)+' dk';
  if(d<86400) return Math.floor(d/3600)+' sa';
  return Math.floor(d/86400)+' gün';
}
function readTime(text){
  const w=(text||'').split(/\s+/).length;
  return Math.max(1,Math.round(w/200))+' dk';
}

// ══════════════════════════════════════════════════════════
// FETCH ALL
// ══════════════════════════════════════════════════════════
async function fetchAll(){
  const btn = document.getElementById('refreshBtn');
  btn.style.opacity='.5';
  const active = sources.filter(s => enabled.has(s.id));
  active.forEach(s => { chStatus[s.id]='loading'; });
  renderSidebarStatus();

  const fresh = [];
  await Promise.allSettled(active.map(async src => {
    try{
      const items = await fetchFeed(src);
      chStatus[src.id] = items.length ? 'ok' : 'fail';
      fresh.push(...items);
    }catch{ chStatus[src.id]='fail'; }
    renderSidebarStatus();
  }));

  btn.style.opacity='1';
  fresh.sort((a,b)=>(b.ts||0)-(a.ts||0));

  const existIds = new Set(allNews.map(n=>n.id));
  const brandNew = fresh.filter(n=>!existIds.has(n.id));

  if(brandNew.length && allNews.length){
    pending = brandNew;
    const b = document.getElementById('newsBadge');
    b.textContent = `↑ ${brandNew.length} yeni haber`;
    b.style.display = 'block';
  } else {
    allNews = fresh;
    saveCache();
    renderGrid();
    updateTicker();
    updateStats();
  }

  clearTimeout(refreshT);
  refreshT = setTimeout(fetchAll, 5*60*1000);
}

function applyPending(){
  if(!pending.length) return;
  allNews = [...pending, ...allNews].slice(0,MAX_CACHE);
  pending = [];
  pageOff = 0;
  document.getElementById('newsBadge').style.display='none';
  saveCache();
  renderGrid();
  updateTicker();
  updateStats();
  showToast('Yeni haberler yüklendi ✓');
}

function manualRefresh(){
  pending=[];
  document.getElementById('newsBadge').style.display='none';
  allNews=[];
  renderGrid();
  fetchAll();
  showToast('Yenileniyor…');
}

// ══════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════
function getFiltered(){
  let list = [...allNews];
  if(activeCh!=='all') list=list.filter(n=>n.src&&n.src.id===activeCh);
  if(activeCat!=='all') list=list.filter(n=>n.cat===activeCat);
  if(searchQ) list=list.filter(n=>n.title.toLowerCase().includes(searchQ)||n.desc.toLowerCase().includes(searchQ));
  return list;
}

function renderGrid(){
  const filtered = getFiltered();
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const lm = document.getElementById('lmWrap');

  if(!filtered.length){
    grid.innerHTML='';
    grid.appendChild(empty);
    empty.style.display='block';
    lm.style.display='none';
    updateStats(0);
    return;
  }
  empty.style.display='none';
  const page = filtered.slice(0, pageOff+PAGE_SIZE);
  grid.innerHTML = page.map((n,i)=>cardHTML(n, i===0 && pageOff===0 && !searchQ && activeCh==='all' && activeCat==='all')).join('');
  lm.style.display = filtered.length > page.length ? 'block' : 'none';
  updateStats(filtered.length);
}

function loadMore(){ pageOff+=PAGE_SIZE; renderGrid(); }

function cardHTML(n, feat){
  const isRead = readSet.has(n.id);
  const src = n.src || {};
  const col = src.color||'#888';
  // badge bg: darken the color with opacity
  const badgeStyle = `background:${col}22;color:${col}`;

  const imgHTML = n.img
    ? `<div class="c-img-wrap"><img class="c-img" src="${escAttr(n.img)}" alt="" loading="lazy" onerror="this.parentElement.className='c-img-ph';this.parentElement.innerHTML='<svg viewBox=\\'0 0 24 24\\'><path d=\\'M4 16l4.586-4.586a2 2 0 0 1 2.828 0L16 16m-2-2 1.586-1.586a2 2 0 0 1 2.828 0L20 14m-6-6h.01M6 20h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2z\\'/></svg>'"/><span class="c-read-lbl">OKUNDU</span></div>`
    : `<div class="c-img-ph"><svg viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 0 1 2.828 0L16 16m-2-2 1.586-1.586a2 2 0 0 1 2.828 0L20 14m-6-6h.01M6 20h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2z"/></svg><span class="c-read-lbl">OKUNDU</span></div>`;

  return `<div class="card${feat?' feat':''}${isRead?' read':''}" onclick="openArticle('${escAttr(n.id)}')" data-id="${escAttr(n.id)}">
    ${imgHTML}
    <div class="c-body">
      <div class="c-meta">
        <span class="c-badge" style="${badgeStyle}">${escHTML(src.name||'')}</span>
        <span class="c-time">${timeAgo(n.ts)}</span>
      </div>
      <div class="c-title">${escHTML(n.title)}</div>
      ${n.desc?`<div class="c-desc">${escHTML(n.desc.slice(0,200))}</div>`:''}
      <div class="c-foot">
        <span class="c-rt">${readTime(n.desc)} okuma</span>
        <span class="c-arr"><svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span>
      </div>
    </div>
  </div>`;
}

function escHTML(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ══════════════════════════════════════════════════════════
// ARTICLE MODAL
// ══════════════════════════════════════════════════════════
function openArticle(id){
  const n = allNews.find(x=>x.id===id);
  if(!n) return;
  readSet.add(id); saveRead();
  const card = document.querySelector(`[data-id="${CSS.escape(id)}"]`);
  if(card) card.classList.add('read');

  const src = n.src||{};
  const mImgWrap = document.getElementById('mImgWrap');
  const mImg = document.getElementById('mImg');

  if(n.img){
    mImgWrap.style.display='block';
    mImg.src = n.img;
    mImg.onerror = ()=>{ mImgWrap.style.display='none'; };
  } else {
    mImgWrap.style.display='none';
  }

  const badge = document.getElementById('mBadge');
  badge.textContent = src.name||'';
  badge.style.cssText = `background:${src.color||'#888'}22;color:${src.color||'#888'}`;

  document.getElementById('mTitle').textContent = n.title;

  const meta = document.getElementById('mMeta');
  const dateStr = n.pubDate ? new Date(n.pubDate).toLocaleString('tr-TR',{dateStyle:'long',timeStyle:'short'}) : 'Tarih bilinmiyor';
  meta.innerHTML = `
    <span><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${dateStr}</span>
    <span><svg viewBox="0 0 24 24"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>${readTime(n.fullDesc||n.desc)} okuma</span>
    <span><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>${src.name||''}</span>
  `;

  // Full content
  const contentEl = document.getElementById('mContent');
  const text = n.fullDesc || n.desc || '';
  if(text.length > 50){
    // Split into readable paragraphs
    const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
    const chunks = [];
    let cur = '';
    sentences.forEach(s => {
      cur += s + ' ';
      if(cur.length > 250){ chunks.push(cur.trim()); cur=''; }
    });
    if(cur.trim()) chunks.push(cur.trim());
    contentEl.innerHTML = chunks.length
      ? chunks.map(c=>`<p>${escHTML(c)}</p>`).join('')
      : `<p>${escHTML(text)}</p>`;
    // Add note if content seems short
    if(text.length < 300){
      contentEl.innerHTML += `<div class="m-full-note">RSS özeti görüntüleniyor. Haberin tamamını okumak için kaynağa gidin.</div>`;
    }
  } else {
    contentEl.innerHTML = `<p style="color:var(--text3)">Haber özeti mevcut değil.</p><div class="m-full-note">Haberin tamamını okumak için kaynağa gidin.</div>`;
  }

  document.getElementById('mLink').href = n.link||'#';
  document.getElementById('mbg').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('mbg').classList.remove('open');
  document.body.style.overflow='';
}

// ══════════════════════════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════════════════════════
function buildSidebar(){
  // Channels
  const cl = document.getElementById('chList');
  cl.innerHTML='';
  const allRow = mkChRow({id:'all',name:'Tümü',color:'#e8c84a'}, true);
  cl.appendChild(allRow);
  sources.forEach(s => cl.appendChild(mkChRow(s, false)));

  // Categories
  const catl = document.getElementById('catList');
  catl.innerHTML='';
  CATS.forEach(c=>{
    const d=document.createElement('div');
    d.className='s-btn'+(c.id==='all'?' active':'');
    d.id='cat-'+c.id;
    d.innerHTML=`<span class="s-ico">${c.ico}</span>${c.label}`;
    d.onclick=()=>setCat(c.id);
    catl.appendChild(d);
  });
}

function mkChRow(src, allRow){
  const d=document.createElement('div');
  d.className='ch-row'+(allRow?' active':'');
  d.id='ch-'+src.id;
  d.innerHTML=`<span class="ch-color" style="background:${src.color}"></span>${src.name}${allRow?'<span class="ch-count" id="cnt-all"></span>':'<span class="ch-status-dot loading" id="dot-'+src.id+'"></span><span class="ch-count" id="cnt-'+src.id+'"></span>'}`;
  d.onclick=()=>setCh(src.id);
  return d;
}

function renderSidebarStatus(){
  sources.forEach(s=>{
    const dot=document.getElementById('dot-'+s.id);
    if(dot) dot.className='ch-status-dot '+(chStatus[s.id]||'loading');
  });
  updateCounts();
}

function updateCounts(){
  sources.forEach(s=>{
    const el=document.getElementById('cnt-'+s.id);
    if(el){ const n=allNews.filter(x=>x.src&&x.src.id===s.id).length; el.textContent=n||''; }
  });
  const allEl=document.getElementById('cnt-all');
  if(allEl) allEl.textContent=allNews.length||'';
}

function setCh(id){
  activeCh=id; pageOff=0;
  document.querySelectorAll('.ch-row').forEach(el=>el.classList.remove('active'));
  const t=document.getElementById('ch-'+id);
  if(t) t.classList.add('active');
  renderGrid();
}
function setCat(id){
  activeCat=id; pageOff=0;
  document.querySelectorAll('.s-btn').forEach(el=>el.classList.remove('active'));
  const t=document.getElementById('cat-'+id);
  if(t) t.classList.add('active');
  renderGrid();
}

// ══════════════════════════════════════════════════════════
// TICKER & STATS
// ══════════════════════════════════════════════════════════
function updateTicker(){
  if(!allNews.length) return;
  const items = allNews.slice(0,20);
  const html = items.map(n=>`<span>${n.src?n.src.name:'?'}: ${n.title}</span><span class="t-sep">·</span>`).join('');
  const el = document.getElementById('tickerInner');
  el.innerHTML = html+html;
}

function updateStats(count){
  const total = count!=null ? count : allNews.length;
  const srcs = new Set(allNews.map(n=>n.src&&n.src.id)).size;
  const now = new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('statsRow').innerHTML =
    `<b>${total}</b> haber <span class="dot-sep"></span> <b>${srcs}</b> kaynak <span class="dot-sep"></span> ${now}`;
}

// ══════════════════════════════════════════════════════════
// SOURCE MANAGER
// ══════════════════════════════════════════════════════════
function openSM(){
  renderSrcList();
  renderFilterGrid();
  document.getElementById('smBg').classList.add('open');
  document.body.style.overflow='hidden';
  switchTab('sources');
}
function closeSM(){ document.getElementById('smBg').classList.remove('open'); document.body.style.overflow=''; }

function switchTab(tab){
  smActiveTab=tab;
  document.querySelectorAll('.sm-tab').forEach((el,i)=>{
    el.classList.toggle('active',['sources','add','filter'][i]===tab);
  });
  document.querySelectorAll('.sm-tab-panel').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}

function renderSrcList(){
  const list = document.getElementById('srcList');
  if(!sources.length){ list.innerHTML='<div style="color:var(--text3);font-size:13px;padding:16px">Henüz kaynak yok.</div>'; return; }
  list.innerHTML = sources.map((s,i)=>`
    <div class="src-item" id="sri-${i}">
      <span class="src-color" style="background:${s.color}"></span>
      <div class="src-info">
        <div class="src-name">${escHTML(s.name)}</div>
        <div class="src-url">${escHTML(s.rss)}</div>
      </div>
      <div class="src-actions">
        <label class="src-toggle">
          <input type="checkbox" ${enabled.has(s.id)?'checked':''} onchange="toggleSource('${s.id}',this.checked)"/>
          <span class="src-track"></span>
          <span class="src-thumb"></span>
        </label>
        <button class="src-del" onclick="deleteSource('${s.id}')" title="Sil">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>`).join('');
}

function renderFilterGrid(){
  const fg = document.getElementById('filterGrid');
  fg.innerHTML = sources.map(s=>`
    <label class="filter-chip${!enabled.has(s.id)?' disabled':''}">
      <input type="checkbox" id="fc-${s.id}" ${enabled.has(s.id)?'checked':''} onchange="fcChange('${s.id}',this.checked)"/>
      <span class="ch-color" style="background:${s.color}"></span>
      ${escHTML(s.name)}
    </label>`).join('');
}

function fcChange(id, checked){
  if(checked) enabled.add(id); else enabled.delete(id);
  const lbl = document.getElementById('fc-'+id)?.closest('.filter-chip');
  if(lbl) lbl.classList.toggle('disabled',!checked);
}

function toggleSource(id, checked){
  if(checked) enabled.add(id); else enabled.delete(id);
  saveEnabled();
  renderFilterGrid();
}

function applyFilters(){
  saveEnabled();
  closeSM();
  manualRefresh();
  showToast('Filtreler uygulandı, yenileniyor…');
}
function selectAllFilters(){ sources.forEach(s=>{ enabled.add(s.id); const el=document.getElementById('fc-'+s.id); if(el){ el.checked=true; el.closest('.filter-chip').classList.remove('disabled'); }}); }
function clearAllFilters(){ enabled.clear(); sources.forEach(s=>{ const el=document.getElementById('fc-'+s.id); if(el){ el.checked=false; el.closest('.filter-chip').classList.add('disabled'); }}); }

function addSource(){
  const name = document.getElementById('addName').value.trim();
  const url  = document.getElementById('addUrl').value.trim();
  if(!name||!url){ showToast('Ad ve URL gerekli'); return; }
  if(!url.startsWith('http')){ showToast('Geçerli bir URL girin'); return; }
  const id = 'custom_'+Date.now();
  const src = {id, name, rss:url, color:selectedColor};
  sources.push(src);
  enabled.add(id);
  saveSources(); saveEnabled();
  document.getElementById('addName').value='';
  document.getElementById('addUrl').value='';
  buildSidebar();
  renderSrcList();
  renderFilterGrid();
  showToast(`"${name}" eklendi ✓`);
  switchTab('sources');
}

function deleteSource(id){
  if(!confirm('Bu kaynağı silmek istediğinizden emin misiniz?')) return;
  sources = sources.filter(s=>s.id!==id);
  enabled.delete(id);
  allNews = allNews.filter(n=>n.src&&n.src.id!==id);
  saveSources(); saveEnabled(); saveCache();
  buildSidebar();
  renderSrcList();
  renderFilterGrid();
  renderGrid();
  showToast('Kaynak silindi');
}

function buildColorPalette(){
  const cr = document.getElementById('colorRow');
  cr.innerHTML = PALETTE.map(c=>`
    <div class="color-swatch${c===selectedColor?' sel':''}" style="background:${c}" onclick="pickColor('${c}',this)"></div>
  `).join('');
}
function pickColor(c, el){
  selectedColor=c;
  document.querySelectorAll('.color-swatch').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
}

// ══════════════════════════════════════════════════════════
// THEME
// ══════════════════════════════════════════════════════════
function applyTheme(){
  const t=localStorage.getItem(K.THEME)||'dark';
  document.documentElement.dataset.theme=t;
  setThemeIcon(t);
}
function toggleTheme(){
  const cur=document.documentElement.dataset.theme==='dark'?'light':'dark';
  document.documentElement.dataset.theme=cur;
  localStorage.setItem(K.THEME,cur);
  setThemeIcon(cur);
}
function setThemeIcon(t){
  document.getElementById('themeIco').innerHTML = t==='light'
    ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
    : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
}

// ══════════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════════
let toastT;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
